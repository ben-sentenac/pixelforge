name: CI

on:
push:
branches:
- main
pull_request:

jobs:
quality:
name: Quality checks
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Install ShellCheck
    run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt

  - name: Run project checks
    run: ./scripts/check.sh
